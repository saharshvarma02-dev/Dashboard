dashboard_html = """
<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <title>Google Play Store Data Analytics Dashboard</title>
    <style>
        body {{
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #fff;
            margin: 0;
            padding: 0;
        }}
        .header {{
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #444;
        }}
        .header img {{
            margin: 0 10px;
            height: 50px;
        }}
        .section {{
            padding: 20px;
            background-color: #3a3a3a;
            margin: 20px 0;
        }}
        .section h2 {{
            text-align: center;
            color: #fff;
            font-size: 24px;
            margin: 0 0 20px 0;
            font-weight: 600;
            border-bottom: 2px solid #555;
            padding-bottom: 15px;
        }}
        .container {{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0;
        }}
        .plot-container {{
            border: 4px solid #555;
            margin: 15px;
            padding: 15px;
            width: {plot_width}px;
            height: {plot_height}px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }}
        .insights {{
            display: none;
            position: absolute;
            right: 10px;
            top: 10px;
            background-color: #444;
            padding: 5px;
            border-radius: 5px;
            color: #fff;
        }}
        .plot-container:hover .insights {{
            display: block;
        }}
    </style>
    <script>
        function openPlot(filename) {{
            window.open(filename, '_blank');
        }}
    </script>
</head>
<body>
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/330px-Google_2015_logo.svg.png" alt="Google Logo">
        <h1>Google Play Store Reviews Analytics</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Google_Play_2022_logo.svg/330px-Google_Play_2022_logo.svg.png" alt="Google Play Store Logo">
    </div>
    <div class="section">
        <h2>TRAINING</h2>
        <div class="container">
            {final_plot_basic}
        </div>
    </div>
    <div class="section">
        <h2>INTERNSHIP</h2>
        <div class="container">
            {final_plot_advanced}
        </div>
    </div>
</body>
</html>
